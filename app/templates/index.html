<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 기반 고등학생 진로 탐색 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Noto Sans KR", sans-serif;
      }
      .chat-bubble {
        max-width: 80%;
        word-wrap: break-word;
      }
      .typing-indicator {
        display: inline-block;
        width: 30px;
        height: 15px;
      }
      .typing-indicator span {
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background-color: #3b82f6;
        animation: typing 1s infinite ease-in-out;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes typing {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
        100% {
          transform: translateY(0);
        }
      }
      .form-section {
        display: none;
      }
      .form-section.active {
        display: block;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
      <header class="text-center mb-12">
        <h1 class="text-4xl font-bold text-indigo-700 mb-2">
          AI 기반 고등학생 진로 탐색 서비스
        </h1>
        <p class="text-gray-600">당신의 꿈과 재능을 AI와 함께 발견하세요</p>
      </header>

      <div id="progress-bar" class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
        <div
          id="progress"
          class="bg-indigo-600 h-2.5 rounded-full"
          style="width: 0%"
        ></div>
      </div>

      <div
        id="user-info-form"
        class="bg-white p-8 rounded-lg shadow-lg mb-8 transition-all duration-300"
      >
        <h2 class="text-2xl font-semibold mb-6 text-indigo-600">
          사용자 정보 입력
        </h2>
        <form id="info-form" class="space-y-6">
          <!-- 1. 기본 정보 섹션 -->
          <div class="form-section active" data-section="1">
            <h3 class="text-xl font-semibold mb-4">기본 정보</h3>
            <div class="space-y-4">
              <div>
                <label
                  for="name"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >이름</label
                >
                <input
                  type="text"
                  id="name"
                  name="name"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
              <div>
                <label
                  for="age"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >나이</label
                >
                <input
                  type="number"
                  id="age"
                  name="age"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
              <div>
                <label
                  for="grade"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >학년</label
                >
                <select
                  id="grade"
                  name="grade"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                >
                  <option value="">선택하세요</option>
                  <option value="1">1학년</option>
                  <option value="2">2학년</option>
                  <option value="3">3학년</option>
                </select>
              </div>
            </div>
          </div>

          <!-- 2. 학업 정보 섹션 -->
          <div class="form-section" data-section="2">
            <h3 class="text-xl font-semibold mb-4">학업 정보</h3>
            <div class="space-y-4">
              <div>
                <label
                  for="academic_track"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >계열</label
                >
                <select
                  id="academic_track"
                  name="academic_track"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                >
                  <option value="">선택하세요</option>
                  <option value="문과">문과</option>
                  <option value="이과">이과</option>
                  <option value="예체능">예체능</option>
                  <option value="기타">기타</option>
                </select>
              </div>
              <div>
                <label
                  for="favorite_subject"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >좋아하는 과목</label
                >
                <input
                  type="text"
                  id="favorite_subject"
                  name="favorite_subject"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
              <div>
                <label
                  for="disliked_subject"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >싫어하는 과목</label
                >
                <input
                  type="text"
                  id="disliked_subject"
                  name="disliked_subject"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
            </div>
          </div>

          <!-- 3. 진로 및 관심사 섹션 -->
          <div class="form-section" data-section="3">
            <h3 class="text-xl font-semibold mb-4">진로 및 관심사</h3>
            <div class="space-y-4">
              <div>
                <label
                  for="interests"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >관심사 (쉼표로 구분)</label
                >
                <input
                  type="text"
                  id="interests"
                  name="interests"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
              <div>
                <label
                  for="hobbies"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >취미 (쉼표로 구분)</label
                >
                <input
                  type="text"
                  id="hobbies"
                  name="hobbies"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
              <div>
                <label
                  for="career_interests"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >관심 있는 직업군</label
                >
                <input
                  type="text"
                  id="career_interests"
                  name="career_interests"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
            </div>
          </div>

          <!-- 4. 활동 및 경험 섹션 -->
          <div class="form-section" data-section="4">
            <h3 class="text-xl font-semibold mb-4">활동 및 경험</h3>
            <div class="space-y-4">
              <div>
                <label
                  for="extracurricular"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >참여 중인 동아리 활동</label
                >
                <input
                  type="text"
                  id="extracurricular"
                  name="extracurricular"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                />
              </div>
              <div>
                <label
                  for="volunteer"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >봉사활동 경험</label
                >
                <textarea
                  id="volunteer"
                  name="volunteer"
                  rows="3"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                ></textarea>
              </div>
              <div>
                <label
                  for="achievements"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >주요 성과 또는 수상 경력</label
                >
                <textarea
                  id="achievements"
                  name="achievements"
                  rows="3"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                ></textarea>
              </div>
            </div>
          </div>

          <!-- 5. 성격 및 특성 섹션 -->
          <div class="form-section" data-section="5">
            <h3 class="text-xl font-semibold mb-4">성격 및 특성</h3>
            <div class="space-y-4">
              <div>
                <label
                  for="mbti"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >MBTI (알고 있다면)</label
                >
                <input
                  type="text"
                  id="mbti"
                  name="mbti"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                />
              </div>
              <div>
                <label
                  for="strengths"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >자신의 강점 (3가지)</label
                >
                <input
                  type="text"
                  id="strengths"
                  name="strengths"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
              <div>
                <label
                  for="weaknesses"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >개선하고 싶은 점 (3가지)</label
                >
                <input
                  type="text"
                  id="weaknesses"
                  name="weaknesses"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  required
                />
              </div>
            </div>
          </div>

          <!-- 6. 학업 및 기술 섹션 -->
          <div class="form-section" data-section="6">
            <h3 class="text-xl font-semibold mb-4">학업 및 기술</h3>
            <div class="space-y-4">
              <div>
                <label
                  for="academic_performance"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >학업 성취도</label
                >
                <select
                  id="academic_performance"
                  name="academic_performance"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                >
                  <option value="">선택하세요</option>
                  <option value="top_10">상위 0~10%</option>
                  <option value="top_20">상위 11~20%</option>
                  <option value="top_30">상위 21~30%</option>
                  <option value="average">평균</option>
                  <option value="below_average">평균 이하</option>
                </select>
              </div>
              <div>
                <label
                  for="language_skills"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >외국어 능력</label
                >
                <input
                  type="text"
                  id="language_skills"
                  name="language_skills"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  placeholder="예: 영어 중급, 일본어 초급"
                />
              </div>
              <div>
                <label
                  for="computer_skills"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >컴퓨터 활용 능력</label
                >
                <input type="text" id="computer_skills" name="computer_skills"
                class="w-full px-3 py-2 border border-gray-300 rounded-md
                shadow-sm focus:outline-none focus:ring-2
                focus:ring-indigo-500<input
                  type="text"
                  id="computer_skills"
                  name="computer_skills"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  placeholder="예: 워드, 엑셀, 파이썬 기초"
                />
              </div>
              <div>
                <label
                  for="reading_habits"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >독서 습관</label
                >
                <input
                  type="text"
                  id="reading_habits"
                  name="reading_habits"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                  placeholder="자주 읽는 책의 장르나 주제"
                />
              </div>
            </div>
          </div>

          <!-- 7. 미래 계획 및 목표 섹션 -->
          <div class="form-section" data-section="7">
            <h3 class="text-xl font-semibold mb-4">미래 계획 및 목표</h3>
            <div class="space-y-4">
              <div>
                <label
                  for="role_model"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >롤모델이나 존경하는 인물</label
                >
                <input
                  type="text"
                  id="role_model"
                  name="role_model"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                />
              </div>
              <div>
                <label
                  for="future_job"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >장래 희망 (구체적인 직업이나 분야)</label
                >
                <input
                  type="text"
                  id="future_job"
                  name="future_job"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                />
              </div>
              <div>
                <label
                  for="five_year_goal"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >향후 5년간의 목표</label
                >
                <textarea
                  id="five_year_goal"
                  name="five_year_goal"
                  rows="3"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                ></textarea>
              </div>
              <div>
                <label
                  for="stress_management"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >스트레스 관리 방법</label
                >
                <input
                  type="text"
                  id="stress_management"
                  name="stress_management"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                />
              </div>
              <div>
                <label
                  for="learning_style"
                  class="block text-sm font-medium text-gray-700 mb-1"
                  >선호하는 학습 스타일</label
                >
                <select
                  id="learning_style"
                  name="learning_style"
                  class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                >
                  <option value="">선택하세요</option>
                  <option value="visual">시각적</option>
                  <option value="auditory">청각적</option>
                  <option value="kinesthetic">실습/체험</option>
                  <option value="reading_writing">읽기/쓰기</option>
                </select>
              </div>
            </div>
          </div>

          <div class="flex justify-between">
            <button
              type="button"
              id="prev-btn"
              class="bg-gray-300 text-gray-700 font-bold py-2 px-4 rounded-md hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 transition-colors duration-300"
              style="display: none"
            >
              이전
            </button>
            <button
              type="button"
              id="next-btn"
              class="bg-indigo-600 text-white font-bold py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors duration-300"
            >
              다음
            </button>
            <button
              type="submit"
              id="submit-btn"
              class="bg-green-600 text-white font-bold py-2 px-4 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition-colors duration-300"
              style="display: none"
            >
              제출
            </button>
          </div>
        </form>
      </div>

      <div
        id="chat-interface"
        class="bg-white p-8 rounded-lg shadow-lg"
        style="display: none"
      >
        <h2 class="text-2xl font-semibold mb-6 text-indigo-600">
          AI와 대화하기
        </h2>
        <div
          id="chat-history"
          class="mb-6 h-96 overflow-y-auto border rounded-md p-4 space-y-4"
        ></div>
        <div
          id="typing-indicator"
          class="text-gray-500 mb-2"
          style="display: none"
        >
          AI가 답변을 작성 중입니다
          <div class="typing-indicator ml-2">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <form
          id="chat-form"
          class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-4"
        >
          <input
            type="text"
            id="user-message"
            class="flex-grow px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="메시지를 입력하세요..."
            required
          />
          <button
            type="submit"
            class="bg-indigo-600 text-white font-bold py-2 px-6 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors duration-300"
          >
            전송
          </button>
        </form>
      </div>
    </div>

    <script>
      let userId = null;
      let currentSection = 1;
      const totalSections = 7;

      function updateProgressBar() {
        const progress = (currentSection / totalSections) * 100;
        document.getElementById("progress").style.width = `${progress}%`;
      }

      function showSection(sectionNumber) {
        document.querySelectorAll(".form-section").forEach((section) => {
          section.classList.remove("active");
        });
        document
          .querySelector(`.form-section[data-section="${sectionNumber}"]`)
          .classList.add("active");

        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const submitBtn = document.getElementById("submit-btn");

        prevBtn.style.display = sectionNumber > 1 ? "block" : "none";
        nextBtn.style.display =
          sectionNumber < totalSections ? "block" : "none";
        submitBtn.style.display =
          sectionNumber === totalSections ? "block" : "none";

        currentSection = sectionNumber;
        updateProgressBar();
      }

      document.getElementById("prev-btn").addEventListener("click", () => {
        if (currentSection > 1) {
          showSection(currentSection - 1);
        }
      });

      document.getElementById("next-btn").addEventListener("click", () => {
        if (currentSection < totalSections) {
          showSection(currentSection + 1);
        }
      });

      document
        .getElementById("info-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);
          const userData = Object.fromEntries(formData.entries());

          const response = await fetch("/submit_info", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(userData),
          });

          const result = await response.json();
          if (response.ok) {
            userId = result.user_id;
            document.getElementById("user-info-form").style.display = "none";
            document.getElementById("chat-interface").style.display = "block";
          } else {
            alert("사용자 정보 제출 중 오류가 발생했습니다.");
          }
        });

      document
        .getElementById("chat-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const messageInput = document.getElementById("user-message");
          const message = messageInput.value.trim();
          if (!message) return;

          const chatHistory = document.getElementById("chat-history");
          const typingIndicator = document.getElementById("typing-indicator");

          chatHistory.innerHTML += `
                  <div class="flex justify-end mb-4">
                      <div class="chat-bubble bg-indigo-100 text-indigo-800 p-3 rounded-lg">
                          ${message}
                      </div>
                  </div>
              `;
          messageInput.value = "";
          chatHistory.scrollTop = chatHistory.scrollHeight;

          typingIndicator.style.display = "block";

          const response = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ user_id: userId, message }),
          });

          typingIndicator.style.display = "none";

          const result = await response.json();
          if (response.ok) {
            chatHistory.innerHTML += `
                      <div class="flex justify-start mb-4">
                          <div class="chat-bubble bg-gray-100 text-gray-800 p-3 rounded-lg">
                              ${result.response}
                          </div>
                      </div>
                  `;
            chatHistory.scrollTop = chatHistory.scrollHeight;
          } else {
            alert("메시지 전송 중 오류가 발생했습니다.");
          }
        });
